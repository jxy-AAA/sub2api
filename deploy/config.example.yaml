# Sub2API example configuration
#
# Notes:
# - This file is intentionally "safe by default". A few example values differ
#   from the code defaults so you do not accidentally deploy with weak secrets.
# - You may delete sections you do not use; omitted keys still fall back to
#   `setDefaults()` values in `backend/internal/config/config.go`.

server:
  host: "127.0.0.1"
  port: 8080
  mode: "release"
  frontend_url: ""
  read_header_timeout: 30
  read_body_timeout: 30
  idle_timeout: 120
  shutdown_timeout: 30
  trusted_proxies: []
  max_request_body_size: 268435456
  h2c:
    enabled: false
    max_concurrent_streams: 50
    idle_timeout: 75
    max_read_frame_size: 1048576
    max_upload_buffer_per_connection: 2097152
    max_upload_buffer_per_stream: 524288

run_mode: "standard"

cors:
  allowed_origins: []
  allow_credentials: true

security:
  url_allowlist:
    enabled: true
    upstream_hosts:
      - "api.openai.com"
      - "api.anthropic.com"
      - "api.kimi.com"
      - "open.bigmodel.cn"
      - "api.minimaxi.com"
      - "generativelanguage.googleapis.com"
      - "cloudcode-pa.googleapis.com"
      - "*.openai.azure.com"
    pricing_hosts:
      - "raw.githubusercontent.com"
    crs_hosts: []
    allow_private_hosts: false
    allow_insecure_http: false
  response_headers:
    enabled: true
    additional_allowed: []
    force_remove: []
  csp:
    enabled: true
    policy: "default-src 'self'; script-src 'self' __CSP_NONCE__ https://challenges.cloudflare.com https://static.cloudflareinsights.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: https:; font-src 'self' data: https://fonts.gstatic.com; connect-src 'self' https:; frame-src https://challenges.cloudflare.com; frame-ancestors 'none'; base-uri 'self'; form-action 'self'"
  proxy_probe:
    insecure_skip_verify: false
  proxy_fallback:
    allow_direct_on_error: false

gateway:
  response_header_timeout: 600
  log_upstream_error_body: true
  log_upstream_error_body_max_bytes: 2048
  inject_beta_for_apikey: false
  failover_on_400: false
  max_account_switches: 10
  max_account_switches_gemini: 3
  force_codex_cli: false
  codex_image_generation_bridge_enabled: false
  openai_passthrough_allow_timeout_headers: false
  openai_ws:
    enabled: true
    mode_router_v2_enabled: false
    ingress_mode_default: "ctx_pool"
    oauth_enabled: true
    apikey_enabled: true
    force_http: false
    allow_store_recovery: false
    ingress_previous_response_recovery_enabled: true
    store_disabled_conn_mode: "strict"
    store_disabled_force_new_conn: true
    prewarm_generate_enabled: false
    responses_websockets: false
    responses_websockets_v2: true
    max_conns_per_account: 128
    min_idle_per_account: 4
    max_idle_per_account: 12
    dynamic_max_conns_by_account_concurrency_enabled: true
    oauth_max_conns_factor: 1.0
    apikey_max_conns_factor: 1.0
    dial_timeout_seconds: 10
    read_timeout_seconds: 900
    write_timeout_seconds: 120
    pool_target_utilization: 0.7
    queue_limit_per_conn: 64
    event_flush_batch_size: 1
    event_flush_interval_ms: 10
    prewarm_cooldown_ms: 300
    fallback_cooldown_seconds: 30
    retry_backoff_initial_ms: 120
    retry_backoff_max_ms: 2000
    retry_jitter_ratio: 0.2
    retry_total_budget_ms: 5000
    payload_log_sample_rate: 0.2
    lb_top_k: 7
    sticky_session_ttl_seconds: 3600
    session_hash_read_old_fallback: true
    session_hash_dual_write_old: true
    metadata_bridge_enabled: true
    sticky_response_id_ttl_seconds: 3600
    sticky_previous_response_ttl_seconds: 3600
    scheduler_score_weights:
      priority: 1.0
      load: 1.0
      queue: 0.7
      error_rate: 0.8
      ttft: 0.5
  image_concurrency:
    enabled: false
    max_concurrent_requests: 0
    overflow_mode: "reject"
    wait_timeout_seconds: 30
    max_waiting_requests: 100
  antigravity_fallback_cooldown_minutes: 1
  antigravity_extra_retries: 10
  max_body_size: 268435456
  upstream_response_read_max_bytes: 8388608
  proxy_probe_response_read_max_bytes: 1048576
  gemini_debug_response_headers: false
  connection_pool_isolation: "account_proxy"
  max_idle_conns: 2560
  max_idle_conns_per_host: 120
  max_conns_per_host: 1024
  idle_conn_timeout_seconds: 90
  max_upstream_clients: 5000
  client_idle_ttl_seconds: 900
  concurrency_slot_ttl_minutes: 30
  stream_data_interval_timeout: 180
  stream_keepalive_interval: 10
  image_stream_data_interval_timeout: 900
  image_stream_keepalive_interval: 10
  max_line_size: 524288000
  scheduling:
    sticky_session_max_waiting: 3
    sticky_session_wait_timeout: 120s
    fallback_wait_timeout: 30s
    fallback_max_waiting: 100
    fallback_selection_mode: "last_used"
    load_batch_enabled: true
    snapshot_mget_chunk_size: 128
    snapshot_write_chunk_size: 256
    slot_cleanup_interval: 30s
    db_fallback_enabled: true
    db_fallback_timeout_seconds: 0
    db_fallback_max_qps: 0
    outbox_poll_interval_seconds: 1
    outbox_lag_warn_seconds: 5
    outbox_lag_rebuild_seconds: 10
    outbox_lag_rebuild_failures: 3
    outbox_backlog_rebuild_rows: 10000
    full_rebuild_interval_seconds: 300
  usage_record:
    worker_count: 128
    queue_size: 16384
    task_timeout_seconds: 5
    overflow_policy: "sample"
    overflow_sample_percent: 10
    auto_scale_enabled: true
    auto_scale_min_workers: 128
    auto_scale_max_workers: 512
    auto_scale_up_queue_percent: 70
    auto_scale_down_queue_percent: 15
    auto_scale_up_step: 32
    auto_scale_down_step: 16
    auto_scale_check_interval_seconds: 3
    auto_scale_cooldown_seconds: 10
  user_group_rate_cache_ttl_seconds: 30
  models_list_cache_ttl_seconds: 15
  user_message_queue:
    enabled: false
    lock_ttl_ms: 120000
    wait_timeout_ms: 30000
    min_delay_ms: 200
    max_delay_ms: 2000
    cleanup_interval_seconds: 60
  tls_fingerprint:
    enabled: true

log:
  level: "info"
  format: "console"
  service_name: "sub2api"
  env: "production"
  caller: true
  stacktrace_level: "error"
  output:
    to_stdout: true
    to_file: true
    file_path: ""
  rotation:
    max_size_mb: 100
    max_backups: 10
    max_age_days: 7
    compress: true
    local_time: true
  sampling:
    enabled: false
    initial: 100
    thereafter: 100

token_refresh:
  enabled: true
  check_interval_minutes: 5
  refresh_before_expiry_hours: 0.5
  max_retries: 3
  retry_backoff_seconds: 2
  sync_linked_sora_accounts: false

api_key_auth_cache:
  l1_size: 65535
  l1_ttl_seconds: 15
  l2_ttl_seconds: 300
  negative_ttl_seconds: 30
  jitter_percent: 10
  singleflight: true

subscription_cache:
  l1_size: 16384
  l1_ttl_seconds: 10
  jitter_percent: 10

dashboard_cache:
  enabled: true
  key_prefix: "sub2api:"
  stats_fresh_ttl_seconds: 15
  stats_ttl_seconds: 30
  stats_refresh_timeout_seconds: 30

dashboard_aggregation:
  enabled: true
  interval_seconds: 60
  lookback_seconds: 120
  backfill_enabled: false
  backfill_max_days: 31
  recompute_days: 2
  retention:
    usage_logs_days: 90
    usage_billing_dedup_days: 365
    hourly_days: 180
    daily_days: 730

usage_cleanup:
  enabled: true
  max_range_days: 31
  batch_size: 5000
  worker_interval_seconds: 10
  task_timeout_seconds: 1800

trace_export:
  enabled: true
  export_dir: "./data/trace-exports"
  poll_interval_seconds: 15
  batch_size: 200
  task_timeout_seconds: 3600
  cleanup_batch_size: 50
  max_records_per_task: 100000

idempotency:
  observe_only: true
  default_ttl_seconds: 86400
  system_operation_ttl_seconds: 3600
  processing_timeout_seconds: 30
  failed_retry_backoff_seconds: 5
  max_stored_response_len: 65536
  cleanup_interval_seconds: 60
  cleanup_batch_size: 500

concurrency:
  ping_interval: 10

database:
  host: "localhost"
  port: 5432
  user: "postgres"
  password: "change_me"
  dbname: "sub2api"
  sslmode: "prefer"
  max_open_conns: 256
  max_idle_conns: 128
  conn_max_lifetime_minutes: 30
  conn_max_idle_time_minutes: 5

redis:
  host: "localhost"
  port: 6379
  password: ""
  db: 0
  dial_timeout_seconds: 5
  read_timeout_seconds: 3
  write_timeout_seconds: 3
  pool_size: 1024
  min_idle_conns: 128
  enable_tls: false

ops:
  enabled: true
  use_preaggregated_tables: true
  cleanup:
    enabled: true
    schedule: "0 2 * * *"
    error_log_retention_days: 30
    minute_metrics_retention_days: 30
    hourly_metrics_retention_days: 30
  aggregation:
    enabled: true
  metrics_collector_cache:
    enabled: true
    ttl: 65s

jwt:
  secret: ""
  expire_hour: 24
  access_token_expire_minutes: 0
  refresh_token_expire_days: 30
  refresh_window_minutes: 2

totp:
  encryption_key: ""

linuxdo_connect:
  enabled: false
  client_id: ""
  client_secret: ""
  authorize_url: "https://connect.linux.do/oauth2/authorize"
  token_url: "https://connect.linux.do/oauth2/token"
  userinfo_url: "https://connect.linux.do/api/user"
  scopes: "user"
  redirect_url: ""
  frontend_redirect_url: "/auth/linuxdo/callback"
  token_auth_method: "client_secret_post"
  use_pkce: false
  userinfo_email_path: ""
  userinfo_id_path: ""
  userinfo_username_path: ""

wechat_connect:
  enabled: false
  app_id: ""
  app_secret: ""
  open_app_id: ""
  open_app_secret: ""
  mp_app_id: ""
  mp_app_secret: ""
  mobile_app_id: ""
  mobile_app_secret: ""
  open_enabled: false
  mp_enabled: false
  mobile_enabled: false
  mode: "open"
  scopes: "snsapi_login"
  redirect_url: ""
  frontend_redirect_url: "/auth/wechat/callback"

oidc_connect:
  enabled: false
  provider_name: "OIDC"
  client_id: ""
  client_secret: ""
  issuer_url: ""
  discovery_url: ""
  authorize_url: ""
  token_url: ""
  userinfo_url: ""
  jwks_url: ""
  scopes: "openid email profile"
  redirect_url: ""
  frontend_redirect_url: "/auth/oidc/callback"
  token_auth_method: "client_secret_post"
  use_pkce: true
  validate_id_token: true
  allowed_signing_algs: "RS256,ES256,PS256"
  clock_skew_seconds: 120
  require_email_verified: false
  userinfo_email_path: ""
  userinfo_id_path: ""
  userinfo_username_path: ""

default:
  admin_email: ""
  admin_password: ""
  user_concurrency: 5
  user_balance: 0
  api_key_prefix: "sk-"
  rate_multiplier: 1.0

rate_limit:
  overload_cooldown_minutes: 10
  oauth_401_cooldown_minutes: 10
  redis_failure_mode: "fail_close"

pricing:
  remote_url: "https://raw.githubusercontent.com/Wei-Shaw/model-price-repo/main/model_prices_and_context_window.json"
  hash_url: "https://raw.githubusercontent.com/Wei-Shaw/model-price-repo/main/model_prices_and_context_window.sha256"
  data_dir: "./data"
  fallback_file: "./resources/model-pricing/model_prices_and_context_window.json"
  update_interval_hours: 24
  hash_check_interval_minutes: 10

billing:
  circuit_breaker:
    enabled: true
    failure_threshold: 5
    reset_timeout_seconds: 30
    half_open_requests: 3

turnstile:
  required: false

gemini:
  allow_native_query_api_key: false
  oauth:
    client_id: ""
    client_secret: ""
    scopes: ""
  quota:
    policy: ""

timezone: "Asia/Shanghai"

subscription_maintenance:
  worker_count: 2
  queue_size: 1024

update:
  proxy_url: ""
